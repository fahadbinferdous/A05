<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | GitHub Issues Tracker</title>

    <!----------------------------- tailwind+daisy --------------------------------->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!----------------------------------geist font ------------------------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!---------------------------------- font awesome ---------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!----------------------------- style ---------------------------------->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F8FAFC]">
    <header>
        <Section class="navbar bg-base-100 shadow-sm flex justify-between px-20">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" alt="" class="h-10 w-10">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </Section>
    </header>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | GitHub Issues Tracker</title>

    <!----------------------------- tailwind+daisy --------------------------------->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!----------------------------------geist font ------------------------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!---------------------------------- font awesome ---------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!----------------------------- style ---------------------------------->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F8FAFC]">
    <header>
        <!-- logo and search -->
        <Section class="navbar bg-base-100 shadow-sm flex justify-between px-20">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" alt="" class="h-10 w-10">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input id="search-Input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button id="search-Btn" class="btn btn-primary">Search</button>
            </div>
        </Section>
    </header>
    <main class="w-5/6 mx-auto py-10">
        <!-- filter buttons section -->
        <Section class="bg-white my-5 px-5 py-5 shadow-sm rounded-xl">
            <button onclick="activeBtn('all-Btn')" id="all-Btn" class="btn btn-primary px-10">All</button>
            <button onclick="activeBtn('open-Btn')" id="open-Btn" class="btn px-10">Open</button>
            <button onclick="activeBtn('closed-Btn')" id="closed-Btn" class="btn px-10">Closed</button>
        </Section>
        <!-- dashboard section -->
        <Section class="bg-white flex justify-between px-5 py-5 rounded-t-xl">
            <div class="flex justify-between items-center gap-3">
                <img src="assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-semibold"><span id="total-Issues">0</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>          
            <div class="flex justify-between items-center gap-5">
                <div class="status status-success "></div>Open
                <div class="status status-primary "></div>Closed
            </div>      
        </Section>
        <!-- spinner -->
        <section id="spinner" class="flex justify-center items-center my-10 hidden">
            <span class="loading loading-spinner loading-xl "></span>
        </section>
        
        <!-- cards section -->
        <section id="cards-Container" class="bg-white px-5 py-5 border-t border-[#d5d9df] rounded-b-xl grid grid-cols-4 gap-5">
            <!-- card -->
        </section>
        
        
        
        
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <h3 id="modal-title" class="text-lg font-bold"></h3>
            <p><strong>Status:</strong> <span id="modal-status"></span></p>

            <p><strong>Priority:</strong> <span id="modal-priority"></span></p>

            <p><strong>Assignee:</strong> <span id="modal-assignee"></span></p>

            <p><strong>Last Updated:</strong> <span id="modal-updated"></span></p>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
        </dialog>
        
    </main>
    <script src="home.js"></script>
</body>
</html>

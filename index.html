<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | GitHub Issues Tracker</title>

    <!----------------------------- tailwind+daisy --------------------------------->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!----------------------------------geist font ------------------------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!---------------------------------- font awesome ---------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!----------------------------- style ---------------------------------->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F8FAFC] flex items-center justify-center">
    <section class="bg-white w-2/6 shrink-0 shadow-xl mx-auto px-8 py-40 rounded-2xl">
        <div class="logo w-full mx-auto flex flex-col items-center justify-center">
            <img src="assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
        </div>
        <div class="w-full mx-auto">
            <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Username</label>
            <input maxlength="5" minlength="5" type="text" id="username-Input" class="input w-full rounded-md" placeholder="Enter Username"/>
            <br>
            <label class="label text-neutral font-bold">Password</label>
            <input maxlength="8" minlength="8" type="password" id="password-Input" class="input w-full rounded-md" placeholder="Enter Password"  />
            <button id="sign-In-Btn" class="btn btn-primary mt-4 rounded-md">Sign In</button>
            </fieldset>
        </div>
        <div class="flex items-center my-4">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-3">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>
        <p class="text-center text-[#64748B]">Demo Credentials:</p>
        <div class="bg-[#F8FAFC] text-center py-5">
            <p><span class="font-semibold">Username: </span>admin</p>
            <p><span class="font-semibold">Password: </span>admin123</p>
        </div>
    </section>
    

    <script src="index.js"></script>
</body>
</html>
